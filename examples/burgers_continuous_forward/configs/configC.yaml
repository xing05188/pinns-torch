defaults:
  - train
  - _self_

N0: 50
N_b: 50
N_f: 10000

# config.yaml 新增一行
use_pde: false   # 实验 C 时改为 false
# 噪声
noise_level: 0.0

time_domain:
  _target_: pinnstorch.data.TimeDomain
  t_interval: [0, 0.99]
  t_points: 100

spatial_domain:
  _target_: pinnstorch.data.Interval
  x_interval: [-1, 1]
  shape: [256, 1]

mesh:
  _target_: pinnstorch.data.Mesh
  root_dir: ${paths.data_dir}
  read_data_fn: ???

train_datasets:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      num_sample: ${N_f}
      collection_points:
        - f
  - initial_condition:
      _target_: pinnstorch.data.InitialCondition
      _partial_: true
      num_sample: ${N0}
      solution:
        - u
  - dirichlet_boundary_condition:
      _target_: pinnstorch.data.DirichletBoundaryCondition
      _partial_: true
      num_sample: ${N_b}
      solution:
        - u

val_dataset:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      solution:
        - u

pred_dataset:
  - mesh_sampler:
      _target_: pinnstorch.data.MeshSampler
      _partial_: true
      solution:
        - u

net:
  _target_: pinnstorch.models.FCN
  layers: [2, 20, 20, 20, 20, 20, 20, 20, 20, 1]
  output_names:
    - u

trainer:
  accelerator: gpu
  max_epochs: 15000
  devices: 1
  deterministic: false
  check_val_every_n_epoch: 1000

model:
  loss_fn: mse
  optimizer:
    _target_: torch.optim.Adam
    lr: 1.0e-3

train: true
val: true
test: false
optimized_metric:
  error:
    - u

plotting:
  _target_: pinnstorch.utils.plot_burgers_continuous_forward
  _partial_: true

seed: 1234
task_name: burgers_continuous_forward

hydra:
  searchpath:
    - pkg://pinnstorch/conf
